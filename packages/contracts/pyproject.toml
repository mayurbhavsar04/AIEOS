[project]
name = "aieos-contracts"
version = "0.0.0"
description = "AIEOS contracts bootstrap package."
requires-python = "==3.13.*"
dependencies = ["aieos-domain"]

[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aieos/contracts"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[tool.uv.sources]
aieos-domain = { workspace = true }
