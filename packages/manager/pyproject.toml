[project]
name = "aieos-manager"
version = "0.0.0"
description = "AIEOS manager bootstrap package."
requires-python = "==3.13.*"
dependencies = [
  "aieos-contracts",
  "aieos-domain",
  "aieos-result-error-support",
  "aieos-security-support",
  "aieos-workflow-engine",
]

[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aieos/manager"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[tool.uv.sources]
aieos-contracts = { workspace = true }
aieos-domain = { workspace = true }
aieos-result-error-support = { workspace = true }
aieos-security-support = { workspace = true }
aieos-workflow-engine = { workspace = true }
