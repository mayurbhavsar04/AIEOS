[project]
name = "aieos-skill-runtime"
version = "0.0.0"
description = "AIEOS skill runtime bootstrap package."
requires-python = "==3.13.*"
dependencies = [
  "aieos-ai-gateway",
  "aieos-capability-registry",
  "aieos-contracts",
  "aieos-domain",
  "aieos-event-bus",
  "aieos-memory-service",
  "aieos-observability",
  "aieos-result-error-support",
  "aieos-security-support",
  "aieos-skill-registry",
]

[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aieos/skill_runtime"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[tool.uv.sources]
aieos-ai-gateway = { workspace = true }
aieos-capability-registry = { workspace = true }
aieos-contracts = { workspace = true }
aieos-domain = { workspace = true }
aieos-event-bus = { workspace = true }
aieos-memory-service = { workspace = true }
aieos-observability = { workspace = true }
aieos-result-error-support = { workspace = true }
aieos-security-support = { workspace = true }
aieos-skill-registry = { workspace = true }
