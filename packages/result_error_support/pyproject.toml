[project]
name = "aieos-result-error-support"
version = "0.0.0"
description = "AIEOS result error support bootstrap package."
requires-python = "==3.13.*"
dependencies = ["aieos-contracts", "aieos-domain"]

[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aieos/result_error_support"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[tool.uv.sources]
aieos-contracts = { workspace = true }
aieos-domain = { workspace = true }
