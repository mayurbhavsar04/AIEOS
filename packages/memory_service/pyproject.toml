[project]
name = "aieos-memory-service"
version = "0.0.0"
description = "AIEOS memory service bootstrap package."
requires-python = "==3.13.*"
dependencies = ["aieos-contracts", "aieos-domain", "aieos-security-support"]

[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aieos/memory_service"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[tool.uv.sources]
aieos-contracts = { workspace = true }
aieos-domain = { workspace = true }
aieos-security-support = { workspace = true }
